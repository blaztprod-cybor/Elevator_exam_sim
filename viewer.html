<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1d5fd1" />
    <title>Reference PDF Viewer</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/icon.svg" />
    <link rel="stylesheet" href="./app.css?v=20260519-inline-reference" />
  </head>
  <body data-page="viewer">
    <main class="viewer-shell">
      <header class="card topbar">
        <div>
          <p class="eyebrow" style="margin: 0 0 8px;">Reference Material</p>
          <h1 id="pdf-title">Reference PDF</h1>
        </div>
        <button type="button" class="btn btn-secondary" onclick="window.close()">Close</button>
      </header>

      <section class="card standalone-pdf-panel">
        <div id="pdf-js-viewer" class="pdf-js-viewer">
          <form id="pdf-search-form" class="pdf-search-form">
            <label for="pdf-search-input">Keyword search</label>
            <div class="pdf-search-controls">
              <input id="pdf-search-input" class="pdf-search-input" type="search" placeholder="Search this reference book" />
              <button id="pdf-search-button" type="submit" class="btn btn-secondary">Search</button>
              <button id="pdf-search-next" type="button" class="btn btn-secondary">Next</button>
            </div>
            <p id="pdf-search-status" class="pdf-search-status" aria-live="polite">Enter a keyword to find matching pages.</p>
          </form>
          <div class="pdf-js-toolbar">
            <button type="button" id="pdf-prev-page" class="btn btn-secondary">Previous Page</button>
            <span id="pdf-page-status">Page 1 / 1</span>
            <button type="button" id="pdf-next-page" class="btn btn-secondary">Next Page</button>
          </div>
          <canvas id="pdf-canvas"></canvas>
        </div>
        <p id="pdf-status" class="pdf-status">Loading selected PDF...</p>
      </section>
    </main>
    <script src="./config.js?v=20260515-render-deploy"></script>
    <script src="./app.js?v=20260519-inline-reference"></script>
    <script src="./pwa-register.js?v=20260519-install-page2"></script>
  </body>
</html>
