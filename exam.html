<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1d5fd1" />
    <title>NYC DOB Elevator Inspector Exam</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/icon.svg" />
    <link rel="stylesheet" href="./app.css?v=20260519-compact-install" />
  </head>
  <body data-page="exam">
    <div class="shell">
      <header class="card topbar">
        <div>
          <p id="exam-mode-label" class="eyebrow" style="margin: 0 0 8px;">Full Exam</p>
          <h1>NYC DOB Elevator Inspector Exam</h1>
        </div>
        <div class="topbar-actions">
          <a href="./start.html" class="nav-link">Opening Screen</a>
          <div class="timer-chip">
            <div>
              <div class="eyebrow" style="margin: 0;">Time Remaining</div>
              <div id="timer" class="timer-value">03:00:00</div>
            </div>
          </div>
          <button id="submit-exam" class="btn btn-danger">Submit Exam</button>
        </div>
      </header>

      <main class="exam-layout">
        <aside class="card sidebar">
          <p class="eyebrow">Reference Materials</p>
          <div class="reference-placeholder-list" aria-label="Reference material placeholders">
            <div class="reference-group">
              <button type="button" class="book-item reference-book" data-book-key="a17-1">ASME A17.1-2004</button>
              <button type="button" class="book-item reference-book" data-book-key="a17-2">ASME A17.2-2010</button>
              <button type="button" class="book-item reference-book" data-book-key="a17-3">ASME A17.3-2015</button>
              <button type="button" class="book-item reference-book" data-book-key="a17-5">ASME A17.5-2004</button>
              <button type="button" class="book-item reference-book" data-book-key="asme-a90-1">ASME A90.1-2009</button>
              <button type="button" class="book-item reference-book" data-book-key="b20-1">ASME B20.1-2015</button>
              <button type="button" class="book-item reference-book" data-book-key="ansi-a10-4">ANSI A10.4-2016</button>
              <button type="button" class="book-item reference-book" data-book-key="icc-a117-1">ICC A117.1-2009</button>
            </div>
            <div class="reference-group">
              <button type="button" class="book-item reference-book" data-book-key="nyc-2014-construction-codes">2014 NYC Construction Codes</button>
              <button type="button" class="book-item reference-book" data-book-key="nyc-bc-chapter-11">NYC Building Code Chapter 11</button>
              <button type="button" class="book-item reference-book" data-book-key="nyc-bc-chapter-30">NYC Building Code Chapter 30</button>
              <button type="button" class="book-item reference-book" data-book-key="nyc-chapter-33">NYC Building Code Chapter 33</button>
              <button type="button" class="book-item reference-book" data-book-key="appendix-k1">Appendix K1, K2, and K3</button>
              <button type="button" class="book-item reference-book" data-book-key="appendix-k4">Appendix K4</button>
              <button type="button" class="book-item reference-book" data-book-key="nyc-electrical-code">NYC Electrical Code 2011</button>
            </div>
          </div>
        </aside>

        <section class="card exam-panel">
          <div id="submit-warning" class="submit-warning" hidden></div>
          <div class="question-meta">
            <div>
              <span class="muted">Question</span>
              <strong id="q-number" style="font-size: 2.2rem; margin-left: 8px;">1</strong>
              <span class="muted">/ <span id="total-questions">50</span></span>
            </div>
            <div id="review-status" class="muted">2 points each</div>
          </div>

          <div id="current-question" class="question-card"></div>

          <div class="nav-row">
            <button id="prev-question" class="btn btn-secondary">Previous</button>
            <button id="mark-review" class="btn btn-secondary">Mark For Review</button>
            <a href="./review.html" id="go-to-review" class="btn btn-secondary">Go To Review</a>
            <button id="next-question" class="btn btn-primary">Next</button>
          </div>
        </section>

      </main>
    </div>
    <script src="./config.js?v=20260515-render-deploy"></script>
    <script src="./app.js?v=20260519-pdf-search"></script>
    <script src="./pwa-register.js?v=20260519-compact-install"></script>
  </body>
  </html>
